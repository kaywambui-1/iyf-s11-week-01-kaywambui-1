<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic HTML Conversion</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">
            <h1>My Site</h1>
        </div>
        
        <!-- Navigation -->
        <nav>
            <ul>
                <li>Home</li>
                <li>About</li>
                <li>Contact</li>
            </ul>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        <article>
            <h2>Welcome to My Site</h2>
            <p>This is my first paragraph...</p>
            <p>This is my second paragraph...</p>
        </article>

        <!-- Sidebar -->
        <aside>
            <div class="widget">
                <h3>Recent Posts</h3>
            </div>
        </aside>
    </main>

    <!-- Footer -->
    <footer>
        <p class="copyright">&copy; 2026</p>
    </footer>

</body>
</html>
