<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Christine Kay</title>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
    
    <h1>Contact Christine Kay</h1>
    
    <form action="#" method="post">
        <fieldset>
            <legend>Personal Information</legend>
            <p>
                <label for="full-name">Full Name:</label>
                <input type="text" id="full-name" name="full-name" placeholder="Christine Kay" required>
            </p>
            <p>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="kamauchristine85@gmail.com" required>
            </p>
            <p>
                <label for="phone">Phone (optional):</label>
                <input type="tel" id="phone" name="phone" placeholder="0793772461">
            </p>
        </fieldset>

        <fieldset>
            <legend>Message Details</legend>
            <p>
                <label for="subject">Subject:</label>
                <select id="subject" name="subject" required>
                    <option value="">Please choose an option</option>
                    <option value="general">General Inquiry</option>
                    <option value="collaboration">Project Collaboration</option>
                    <option value="hiring">Hiring / Opportunity</option>
                </select>
            </p>
            <p>
                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="5" minlength="50" placeholder="Please enter your message (minimum 50 characters)..." required></textarea>
            </p>
        </fieldset>

        <p>
            <input type="checkbox" id="newsletter" name="newsletter">
            <label for="newsletter">Subscribe to my newsletter</label>
        </p>

        <p>
            <button type="submit">Send Message</button>
        </p>
    </form>
</body>
</html>
